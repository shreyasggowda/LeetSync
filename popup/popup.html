<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetSync</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <p class="eyebrow">Chrome Extension</p>
        <h1><img src="../icons/icon48.png" width="24" height="24" style="vertical-align: middle; border-radius: 4px;" alt=""/> LeetSync</h1>
        <p class="subtitle">Ship accepted LeetCode solutions into GitHub without the copy-paste routine.</p>
        <div class="oauth-row">
          <button id="oauth-login" type="button">Connect GitHub</button>
          <button id="oauth-logout" type="button" class="secondary hidden">Sign out</button>
        </div>
        <p id="oauth-status" class="helper-text">Not connected yet.</p>
      </section>

      <section class="status-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <p class="label">Sync Status</p>
          <button id="manual-sync" type="button" class="secondary" style="font-size: 11px; padding: 4px 8px; width: auto; flex: 0 0 auto; margin: 0;" title="Force sync the current problem">Force Sync</button>
        </div>
        <p id="sync-state" class="status-pill">Loading...</p>
        <p id="last-sync" class="muted">No sync yet.</p>
        <p id="last-error" class="error-text"></p>
      </section>

      <section class="dashboard-card" id="dashboard-section" style="display: none;">
        <p class="label">Problems Solved</p>
        <div class="stats-row">
          <div class="stat-box easy">
            <span class="stat-count" id="stat-easy">0</span>
            <span class="stat-label">Easy</span>
          </div>
          <div class="stat-box medium">
            <span class="stat-count" id="stat-medium">0</span>
            <span class="stat-label">Medium</span>
          </div>
          <div class="stat-box hard">
            <span class="stat-count" id="stat-hard">0</span>
            <span class="stat-label">Hard</span>
          </div>
        </div>
        <p class="total-solved">Total: <span id="stat-total">0</span></p>
      </section>

      <form id="settings-form" class="settings-form">
        <div class="form-header">
          <div>
            <p class="meta-title">Repository Setup</p>
            <p id="repo-setup-hint" class="helper-text">Where should your LeetCode solutions be saved?</p>
          </div>
        </div>

        <label>
          Repository Name
          <input id="repository-name" name="repositoryName" type="text" placeholder="my-leetcode-solutions" />
        </label>
        <label>
          Branch
          <input id="branch" name="branch" type="text" placeholder="main" />
        </label>

        <label style="flex-direction: row; align-items: center; cursor: pointer; margin-top: 2px;">
          <input id="auto-create" name="autoCreate" type="checkbox" style="width: auto; margin: 0; accent-color: var(--accent);" />
          <span style="font-size: 12px;">Create repository if it doesn't exist</span>
        </label>

        <div class="action-row">
          <button id="save-repo" type="submit">Link / Create Repository</button>
        </div>
      </form>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
